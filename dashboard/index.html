<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard PRO – La Cueva del Güero</title>
    <link rel="stylesheet" href="/css/dashboard-pro.css">
</head>

<body>

    <h1>Dashboard PRO – La Cueva del Güero</h1>
    <p class="subtitulo">Consulta episodios, escaletas, guiones y cue cards generadas por el sistema.</p>

    <button id="btnCargarRegistros" class="btn-neon">📡 Cargar episodios</button>

    <div id="contenedorDashboard">

        <!-- LISTA DE EPISODIOS -->
        <div class="panel panel-lista">
            <h2>Episodios</h2>
            <div id="listaRegistros" class="lista">Presiona el botón para cargar episodios…</div>
        </div>

        <!-- DETALLE DEL EPISODIO -->
        <div class="panel panel-detalle">
            <h2>Detalle</h2>
            <div id="detalleRegistro" class="detalle">Selecciona un episodio para ver su contenido.</div>
        </div>

    </div>

    <script src="/js/dashboard-pro.js"></script>

</body>
</html>
