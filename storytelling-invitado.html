<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storytelling Invitado – La Cueva del Güero</title>

  <!-- Estilos base del sitio -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/paw-agent.css">

  <!-- CSS específico de este formulario -->
  <link rel="stylesheet" href="css/storytelling-invitado.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">

  <link rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" 
        crossorigin="anonymous" 
        referrerpolicy="no-referrer" />

  <style>
    body {
      background: #0a0a0a;
      color: #e6e6e6;
      font-family: 'Architects Daughter', cursive;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #FF00FF;
      text-shadow: 0 0 15px #FF00FF;
      margin-bottom: 5px;
    }
    .subtitulo {
      text-align: center;
      color: #00FFFF;
      text-shadow: 0 0 8px #00FFFF;
      margin-bottom: 30px;
    }
    .botones {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 25px;
    }
    .botones button {
      padding: 12px 20px;
      background: #111;
      border: 1px solid #00FFFF;
      color: #00FFFF;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
    }
    .botones button:hover {
      background: #00FFFF;
      color: #111;
      box-shadow: 0 0 15px #00FFFF;
    }
    .panel {
      display: none;
    }
    .panel.visible {
      display: block;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #00FFFF;
      text-decoration: none;
    }
    .back-link:hover {
      text-shadow: 0 0 8px #00FFFF;
    }
  </style>
</head>
<body>
  <script>
    // Validar acceso exclusivo como invitado identificado por la pata del bot
    if (localStorage.getItem('paw_guest_access') !== 'true') {
      document.body.innerHTML = `
        <div style="background:#0a0a0a; color:#fff; font-family:'Outfit', sans-serif; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; margin:0; text-align:center;">
          <div style="background:rgba(15,15,15,0.8); border:1px solid #FF00FF; box-shadow:0 0 20px rgba(255,0,255,0.3); padding:40px; border-radius:12px; max-width:400px; box-sizing:border-box;">
            <h2 style="color:#FF00FF; text-shadow:0 0 10px #FF00FF; margin-bottom:15px;">🔒 Acceso Restringido</h2>
            <p style="color:#ddd; margin-bottom:25px; line-height:1.5;">Por seguridad, debes identificarte primero como invitado conversando con el Güero Bot en la página principal.</p>
            <a href="index.html" style="display:inline-block; padding:12px 20px; background:#00FFFF; border:none; color:#111; font-weight:bold; border-radius:8px; text-decoration:none; box-shadow:0 0 10px rgba(0,255,255,0.3); transition:0.2s;">Volver al Inicio</a>
          </div>
        </div>
      `;
      document.body.style.padding = "0";
      window.stop(); // Detener el renderizado del resto del documento
    }
  </script>

  <a href="index.html" class="back-link">← Volver a La Cueva</a>

  <h1>🎙 Storytelling del Invitado</h1>
  <p class="subtitulo">Presentación + Storytelling + Guion + Escaleta + Cue Cards</p>

  <section id="contenedorStorytelling">
    <form id="formStorytelling">
      <!-- IDENTIDAD -->
      <h2>Identidad del invitado</h2>

      <label for="st_nombre">Nombre completo o artístico</label>
      <input type="text" id="st_nombre" required>

      <label for="st_ocupacion">Ocupación actual</label>
      <input type="text" id="st_ocupacion" required>

      <label for="st_frase">Frase que lo describe en una línea</label>
      <input type="text" id="st_frase" required>

      <label for="st_barrio">Barrio / ciudad de origen</label>
      <input type="text" id="st_barrio" required>

      <!-- HISTORIA BASE -->
      <h2>Historia base</h2>

      <label for="st_historia">Historia resumida (5–10 líneas)</label>
      <textarea id="st_historia" rows="5" required></textarea>

      <!-- STORYTELLING DETONANTE -->
      <h2>Storytelling de apertura</h2>

      <label for="st_anecdota">Anécdota detonante que lo representa</label>
      <textarea id="st_anecdota" rows="4" required></textarea>

      <label for="st_momento">Momento más decisivo de su vida</label>
      <textarea id="st_momento" rows="4" required></textarea>

      <label for="st_herida">Herida emocional / obstáculo fuerte</label>
      <textarea id="st_herida" rows="4" required></textarea>

      <label for="st_trayectoria">Trayectoria (cómo llegó hasta aquí)</label>
      <textarea id="st_trayectoria" rows="4" required></textarea>

      <!-- GUION DE PREGUNTAS -->
      <h2>Guion de preguntas</h2>

      <label for="st_incomodo">Temas incómodos / límites</label>
      <textarea id="st_incomodo" rows="3"></textarea>

      <label for="st_vulnerabilidad">Vulnerabilidades (qué lo hace sentir expuesto)</label>
      <textarea id="st_vulnerabilidad" rows="3"></textarea>

      <label for="st_pasiones">Pasiones / temas que ama hablar</label>
      <textarea id="st_pasiones" rows="3"></textarea>

      <label for="st_logros">Logros clave que deben salir en el episodio</label>
      <textarea id="st_logros" rows="3"></textarea>

      <!-- LOGÍSTICA -->
      <h2>Logística</h2>

      <label for="st_fecha">Fecha propuesta de grabación</label>
      <input type="text" id="st_fecha" placeholder="DD/MM/AAAA">

      <label for="st_contacto">Contacto (teléfono o correo)</label>
      <input type="text" id="st_contacto">

      <div class="botones">
        <button type="button" id="st_generar">🚀 Generar paquete</button>
        <button type="button" id="st_copiar">📋 Copiar resultado</button>
        <button type="button" id="st_descargar">💾 Descargar TXT</button>
        <button type="button" id="st_limpiar">🧹 Limpiar</button>
      </div>
    </form>
  </section>

  <section id="st_resultado" class="panel">
    <h2>Resultado – Paquete completo del episodio</h2>
    <div id="st_bloques"></div>
  </section>

  <!-- JS de página -->
  <script src="js/storytelling-invitado-page.js"></script>
</body>
</html>
