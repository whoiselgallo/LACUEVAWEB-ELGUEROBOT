<body>
  <!-- 🔥 CONTENIDO PRINCIPAL DE LA CUEVA -->
  <main>
    <!-- ... todas tus secciones existentes (inicio, sobre, invitados, multimedia, etc.) ... -->
  </main>

  <!-- 🐾 NUEVO CONTENEDOR DEL PAW AGENT -->
  <div id="pawAgentContainer" class="paw-container">
    <div class="paw-main">
      <button class="paw-minimize-btn" aria-label="Minimizar huella">−</button>


      <div id="pawAgentContainer">
  <div class="paw-main">
    <div class="paw-minimize-btn">–</div>
    <!-- resto del contenido del agente -->
  </div>
</div>


      <picture class="paw-agent-logo-wrapper">
        <source srcset="images/pewagent.webp" type="image/webp">
        <img src="images/pewagent.png" alt="PewAgent" class="paw-agent-logo" loading="lazy">
      </picture>

      <div class="paw-minimized-dialog">El Güero Bot</div>

      <div class="paw-toes">
        <div class="paw-toe" data-label="Enviar"></div>
        <div class="paw-toe" data-label="Chat"></div>
        <div class="paw-toe" data-label="Equipo"></div>
        <div class="paw-toe" data-label="Invitado"></div>
        <div class="paw-toe" data-label="Seguidor"></div>
      </div>

      <div class="paw-chat-area">
        <div class="paw-chat-header">
          <h3>Güero Bot Paw</h3>
          <span class="paw-visit-badge paw-visit-guest">INVITADO</span>
        </div>

        <div id="pawChatBody" class="paw-chat-body"></div>

        <div class="paw-chat-controls">
          <select id="pawVisitType">
            <option value="guest" selected>Invitado</option>
            <option value="team">Equipo</option>
            <option value="follower">Seguidor</option>
          </select>

          <div class="paw-input-row">
            <input id="pawChatInput" type="text" placeholder="Escribe aquí, perro..." autocomplete="off">
            <button type="button" class="paw-send-btn">Enviar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 🧠 FOOTER ORIGINAL -->
  <footer class="footer-smoke">
    <!-- ... contenido del footer ... -->
  </footer>

<script src="/paw-agent/paw-storytelling.js"></script>
