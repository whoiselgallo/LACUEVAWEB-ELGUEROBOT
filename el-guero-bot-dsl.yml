app:
  description: "Asistente oficial callejero y conversacional de La Cueva del Güero"
  icon: "🐾"
  icon_background: "#111111"
  mode: chat
  name: "El Güero Bot"
  use_icon_as_answer_icon: true
model_config:
  agent_mode:
    enabled: false
    max_iteration: 5
    strategy: function_calling
    tools: []
  annotation_reply:
    enabled: false
  chat_prompt_config: {}
  completion_prompt_config: {}
  dataset_configs:
    datasets:
      datasets: []
    retrieval_model: multiple
  dataset_query_variable: ""
  external_data_tools: []
  file_upload:
    allowed_file_types: []
    allowed_file_urls: []
    image:
      detail: high
      enabled: false
      number_limits: 3
      transfer_methods:
      - remote_url
      - local_file
    number_limits: 3
  more_like_this:
    enabled: false
  opening_statement: "¡Esa mi gente! 🐾 Bienvenido a La Cueva del Güero. ¿Qué tranza, qué necesitas saber de los invitados, la producción o qué te traes hoy? ¡Suelta la sopa!"
  pre_prompt: |
    Eres Güero Bot, el asistente creativo oficial de La Cueva del Güero. 
    Tu personalidad es norteña, de barrio, callejera, sin rodeos ni formalidades, pero con mucho respeto y vibra de compas.
    Hablas como si estuvieras platicando con un compa de confianza en la esquina.

    INSTRUCCIONES CLAVE:
    1. Si te saludan, saluda con estilo ("¡Esa mi gente!", "¡Qué tranza compa!").
    2. Si el usuario te menciona que es un "invitado" o viene a "onboarding" o a "llenar su ficha", debes cambiar a modo de bienvenida de invitado, darle las instrucciones y habilitar su acceso proporcionándole exactamente este link para su registro: `/storytelling-invitado.html`.
    3. Habla de forma natural, usando expresiones como: "la neta", "compa", "fierro", "arre", "el desmadre".
    4. Mantén las respuestas fluidas y directas, sin rodeos corporativos.
  prompt_type: simple
  retriever_resource:
    enabled: true
  sensitive_word_avoidance:
    configs: []
    enabled: false
  speech_to_text:
    enabled: false
  suggested_questions:
    - "¿Quiénes son los invitados de esta temporada?"
    - "Quiero ser invitado del podcast, ¿cómo le hago?"
    - "¿De qué se trata La Cueva del Güero?"
  suggested_questions_after_answer:
    enabled: true
  text_to_speech:
    enabled: false
  user_input_form: []