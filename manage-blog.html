<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Blog - La Cueva del Güero</title>
    <!-- Font Awesome 6.5.1 (CDN oficial) -->
    <link rel="stylesheet" 
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" 
          crossorigin="anonymous" 
          referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #0a0e27;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #1a1a2e;
            border: 2px solid #00ffff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        h1 {
            color: #00ffff;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #00ffff;
        }

        .tab-btn {
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: #4EFC22;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab-btn:hover,
        .tab-btn.active {
            color: #00ffff;
            border-bottom-color: #00ffff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #4EFC22;
            font-weight: bold;
        }

        input[type="text"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            background: #0a0e27;
            border: 2px solid #00ffff;
            border-radius: 5px;
            color: #fff;
            font-family: inherit;
            resize: vertical;
        }

        input[type="file"] {
            padding: 10px;
            background: #0a0e27;
            border: 2px dashed #00ffff;
            border-radius: 5px;
            color: #4EFC22;
            cursor: pointer;
        }

        textarea {
            min-height: 200px;
            font-family: 'Courier New', monospace;
        }

        .upload-area {
            border: 3px dashed #4EFC22;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background: rgba(78, 252, 34, 0.05);
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #00ffff;
            background: rgba(0, 255, 255, 0.05);
        }

        .upload-area.dragover {
            border-color: #ff00ff;
            background: rgba(255, 0, 255, 0.1);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #4EFC22, #00ffff);
            border: none;
            border-radius: 5px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            margin-right: 10px;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #4EFC22;
            color: #4EFC22;
        }

        .btn-secondary:hover {
            background: rgba(78, 252, 34, 0.1);
        }

        .status {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: rgba(78, 252, 34, 0.2);
            border: 2px solid #4EFC22;
            color: #4EFC22;
        }

        .status.error {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff0000;
            color: #ff6666;
        }

        .status.info {
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #00ffff;
            color: #00ffff;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .preview-section {
            background: #0a0e27;
            border: 2px solid #4EFC22;
            border-radius: 5px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }

        .preview-section.show {
            display: block;
        }

        .preview-titulo {
            color: #00ffff;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .preview-meta {
            color: #4EFC22;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .preview-contenido {
            color: #ccc;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
        }

        .posts-list {
            display: grid;
            gap: 15px;
        }

        .post-item {
            background: #0a0e27;
            border-left: 4px solid #4EFC22;
            padding: 15px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .post-item:hover {
            border-left-color: #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .post-item-titulo {
            color: #00ffff;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .post-item-meta {
            color: #4EFC22;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .post-item-excerpt {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .copy-btn {
            padding: 8px 15px;
            font-size: 0.85rem;
            margin-right: 5px;
        }

        .file-info {
            background: rgba(78, 252, 34, 0.1);
            border-left: 4px solid #4EFC22;
            padding: 12px;
            border-radius: 3px;
            margin-bottom: 20px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #4EFC22;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========================
           ESTILOS PARA COMPARTIR
           ======================== */

        .share-buttons-container {
            background: linear-gradient(135deg, rgba(78, 252, 34, 0.1) 0%, rgba(0, 255, 255, 0.1) 100%);
            border: 2px solid #4EFC22;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
        }

        .share-buttons-header {
            margin-bottom: 15px;
        }

        .share-buttons-header h3 {
            color: #00ffff;
            font-size: 1.1rem;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .share-buttons-header p {
            color: #4EFC22;
            font-size: 0.85rem;
            margin: 0;
            word-break: break-all;
        }

        .share-buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }

        .share-btn {
            padding: 10px 15px;
            border: 2px solid #4EFC22;
            background: rgba(78, 252, 34, 0.05);
            color: #4EFC22;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
        }

        .share-btn:hover {
            background: rgba(78, 252, 34, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(78, 252, 34, 0.4);
        }

        .share-copy {
            border-color: #00ffff;
            color: #00ffff;
            background: rgba(0, 255, 255, 0.05);
        }

        .share-copy:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        .share-whatsapp:hover {
            border-color: #25D366;
            color: #25D366;
            background: rgba(37, 211, 102, 0.1);
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.3);
        }

        .share-facebook:hover {
            border-color: #1877F2;
            color: #1877F2;
            background: rgba(24, 119, 242, 0.1);
            box-shadow: 0 0 15px rgba(24, 119, 242, 0.3);
        }

        .share-twitter:hover {
            border-color: #1DA1F2;
            color: #1DA1F2;
            background: rgba(29, 161, 242, 0.1);
            box-shadow: 0 0 15px rgba(29, 161, 242, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Gestor de Blog - La Cueva del Güero</h1>

        <div class="tabs">
            <button class="tab-btn active" data-tab="subir">📤 Subir PDF</button>
             <button class="tab-btn active" data-tab="subir">📤 Cargar PDF</button>
            <button class="tab-btn" data-tab="editar">✏️ Editar Post</button>
            <button class="tab-btn" data-tab="historial">📚 Historial</button>
        </div>

        <!-- TAB 1: SUBIR PDF -->
        <div id="subir" class="tab-content active">
            <div class="status" id="status-upload"></div>

            <div class="form-group">
                <label>Selecciona un PDF para convertir a Post</label>
                <div class="upload-area" id="upload-area">
                    <div class="upload-icon">📄</div>
                    <p>Arrastra un PDF aquí o haz clic para seleccionar</p>
                    <input type="file" id="pdf-input" accept=".pdf" style="display: none;">
                </div>
            </div>

            <div class="file-info" id="file-info">
                <strong>Archivo seleccionado:</strong> <span id="file-name"></span>
            </div>

            <div class="preview-section" id="pdf-preview">
                <h3 class="preview-titulo">Vista previa del contenido extraído</h3>
                <div class="preview-contenido" id="pdf-content"></div>
            </div>

            <div>
                <button id="btn-extract" disabled>🔍 Procesar PDF</button>
                <button class="btn-secondary" id="btn-clear-upload">Limpiar</button>
            </div>
        </div>

        <!-- TAB 2: EDITAR POST -->
        <div id="editar" class="tab-content">
            <div class="status" id="status-edit"></div>

            <div class="form-group">
                <label>📝 Título del Post *</label>
                <input type="text" id="post-titulo" placeholder="Ej: La Mente es el Arma Más Poderosa">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>✍️ Autor *</label>
                    <input type="text" id="post-autor" placeholder="Ej: El Güero">
                </div>

                <div class="form-group">
                    <label>📅 Fecha</label>
                    <input type="date" id="post-fecha">
                </div>
            </div>

            <div class="form-group">
                <label>🏷️ Categoría</label>
                <select id="post-categoria">
                    <option value="reflexion">Reflexión</option>
                    <option value="articulo reflexivo">Artículo Reflexivo</option>
                    <option value="horoscopo">Horóscopo</option>
                    <option value="Apariencias Vs Realidad">Apariencias Vs Realidad</option>
                    <option value="historia">Historia</option>
                    <option value="consejo">Consejo</option>
                </select>
            </div>

            <div class="form-group">
                <label>📄 Contenido del Post *</label>
                <textarea id="post-contenido" placeholder="Pega aquí el contenido extraído del PDF y edítalo si es necesario..."></textarea>
            </div>

            <div class="form-group">
                <label>💬 Extracto (resumen breve)</label>
                <textarea id="post-excerpt" placeholder="Resumen de 150 caracteres aprox. Se genera automáticamente si lo dejas vacío." rows="3"></textarea>
            </div>

            <div class="preview-section" id="post-preview">
                <h3 class="preview-titulo" id="preview-titulo-text">Vista previa</h3>
                <div class="preview-meta">
                    <span id="preview-autor">Por: -</span> • 
                    <span id="preview-fecha">Fecha: -</span>
                </div>
                <div class="preview-contenido" id="preview-contenido-text"></div>
            </div>

            <div>
                <button id="btn-publish">✅ Publicar Post</button>
                <button class="btn-secondary" id="btn-preview">👁️ Previsualizar</button>
                <button class="btn-secondary" id="btn-clear-form">Limpiar Formulario</button>
            </div>
        </div>

        <!-- TAB 3: HISTORIAL -->
        <div id="historial" class="tab-content">
            <div class="status" id="status-history"></div>
            <button id="btn-load-posts" style="margin-bottom: 20px;">🔄 Cargar Posts Publicados</button>
            <div class="posts-list" id="posts-container"></div>
        </div>
    </div>

    <!-- CDN de PDF.js para extraer texto de PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="js/manage-blog.js"></script>
</body>
</html>
